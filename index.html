<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 US Open Pool</title>
<style>
  :root {
    --uso-blue: #003366;
    --uso-dark: #002244;
    --uso-red: #c41e3a;
    --uso-gold: #c8a951;
    --uso-cream: #f0f2f5;
    --uso-light: #e3eaf5;
    --cut-red: #c0392b;
    --birdie-red: #d32f2f;
    --bogey-blue: #1565c0;
    --par: #333;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Georgia', 'Times New Roman', serif;
    background: var(--uso-cream);
    color: #333;
    min-height: 100vh;
  }
  header {
    background: var(--uso-blue);
    color: white;
    text-align: center;
    padding: 24px 16px 18px;
    border-bottom: 4px solid var(--uso-red);
  }
  header h1 { font-size: 2rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
  header .subtitle { color: var(--uso-gold); font-size: 1rem; font-style: italic; }
  .info-bar {
    background: var(--uso-dark);
    color: white;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: 12px 32px;
    padding: 10px 16px;
    font-size: 0.85rem;
  }
  .info-bar span { white-space: nowrap; }
  .info-bar .gold { color: var(--uso-gold); font-weight: bold; }
  .live-dot {
    display: inline-block;
    width: 8px; height: 8px;
    background: #4caf50;
    border-radius: 50%;
    margin-right: 4px;
    animation: pulse 2s infinite;
  }
  .live-dot.offline { background: #999; animation: none; }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .tabs {
    display: flex;
    justify-content: center;
    gap: 0;
    background: white;
    border-bottom: 2px solid #ddd;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .tab-btn {
    padding: 12px 24px;
    border: none;
    background: white;
    font-family: Georgia, serif;
    font-size: 0.95rem;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
    color: #666;
  }
  .tab-btn:hover { color: var(--uso-blue); }
  .tab-btn.active {
    color: var(--uso-blue);
    border-bottom-color: var(--uso-red);
    font-weight: bold;
  }

  .container { max-width: 1100px; margin: 0 auto; padding: 16px; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .leaderboard-table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    margin-top: 12px;
  }
  .leaderboard-table th {
    background: var(--uso-blue);
    color: white;
    padding: 10px 12px;
    text-align: left;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .leaderboard-table th.score-col,
  .leaderboard-table td.score-col { text-align: center; }
  .leaderboard-table td {
    padding: 8px 12px;
    border-bottom: 1px solid #eee;
    font-size: 0.9rem;
  }
  .leaderboard-table tr:hover { background: var(--uso-light); }
  .leaderboard-table tr.cut td { color: #999; text-decoration: line-through; }
  .leaderboard-table tr.cut td.pos-col { text-decoration: none; }
  .pos-col { width: 40px; text-align: center; font-weight: bold; color: #888; }
  .owner-badge {
    display: inline-block;
    background: var(--uso-blue);
    color: white;
    padding: 1px 8px;
    border-radius: 10px;
    font-size: 0.7rem;
    margin-left: 8px;
    vertical-align: middle;
  }
  .score-under { color: var(--birdie-red); font-weight: bold; }
  .score-over { color: var(--bogey-blue); font-weight: bold; }
  .score-even { color: var(--par); }
  .score-cut { color: #999; }

  .team-standings { display: grid; gap: 12px; margin-top: 12px; }
  .team-standing {
    background: white;
    border-radius: 8px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    overflow: hidden;
  }
  .team-standing-row {
    padding: 16px 20px;
    display: grid;
    grid-template-columns: 40px 1fr auto 24px;
    align-items: center;
    gap: 16px;
    cursor: pointer;
    transition: background 0.15s;
    user-select: none;
  }
  .team-standing-row:hover { background: var(--uso-light); }
  .team-standing.ineligible { opacity: 0.6; }
  .team-standing.last-place { border: 2px solid var(--cut-red); }
  .team-rank { font-size: 1.5rem; font-weight: bold; color: var(--uso-gold); text-align: center; }
  .team-rank.first { color: #c8a951; }
  .team-rank.second { color: #8a8a8a; }
  .team-rank.last { color: var(--cut-red); }
  .team-info h3 { font-size: 1.1rem; margin-bottom: 2px; }
  .team-info .players-made-cut { font-size: 0.8rem; color: #888; }
  .team-info .ineligible-label { color: var(--cut-red); font-weight: bold; font-size: 0.75rem; }
  .team-info .last-label { color: var(--cut-red); font-weight: bold; font-size: 0.75rem; }
  .team-total-score { font-size: 1.4rem; font-weight: bold; }
  .team-caret {
    font-size: 0.9rem;
    color: #999;
    transition: transform 0.2s;
    text-align: center;
  }
  .team-standing.expanded .team-caret { transform: rotate(180deg); }
  .team-players-dropdown {
    display: none;
    border-top: 1px solid #eee;
    background: #fafafa;
  }
  .team-standing.expanded .team-players-dropdown { display: block; }
  .team-dropdown-player {
    display: grid;
    grid-template-columns: 40px 1fr auto auto;
    gap: 12px;
    padding: 8px 20px;
    font-size: 0.85rem;
    border-bottom: 1px solid #f0f0f0;
    align-items: center;
  }
  .team-dropdown-player:last-child { border-bottom: none; }
  .team-dropdown-player.cut { color: #bbb; text-decoration: line-through; }
  .team-dropdown-player.cut .dropdown-score { text-decoration: none; }
  .team-dropdown-player .dropdown-pick { color: #aaa; font-size: 0.75rem; text-align: center; }
  .team-dropdown-player .dropdown-thru { color: #999; font-size: 0.75rem; }
  .team-dropdown-player .dropdown-score { font-weight: bold; min-width: 40px; text-align: right; }

  .teams-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    margin-top: 12px;
  }
  .team-card {
    background: white;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  .team-card-header {
    background: var(--uso-blue);
    color: white;
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .team-card-header h3 { font-size: 1rem; }
  .team-card-header .team-score { color: var(--uso-gold); font-size: 1.1rem; }
  .team-card-body { padding: 0; }
  .team-player {
    display: flex;
    justify-content: space-between;
    padding: 8px 16px;
    border-bottom: 1px solid #f0f0f0;
    font-size: 0.85rem;
  }
  .team-player:last-child { border-bottom: none; }
  .team-player.cut { color: #bbb; text-decoration: line-through; }
  .team-player .pick-num { color: #aaa; margin-right: 6px; font-size: 0.75rem; }
  .team-player .player-score { font-weight: bold; }

  .payouts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
    margin-top: 12px;
  }
  .payout-card {
    background: white;
    border-radius: 8px;
    padding: 20px;
    text-align: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    border-top: 4px solid var(--uso-red);
  }
  .payout-card.penalty { border-top-color: var(--cut-red); }
  .payout-card h3 { color: var(--uso-blue); margin-bottom: 8px; }
  .payout-amount { font-size: 1.8rem; font-weight: bold; color: var(--uso-gold); }
  .payout-amount.penalty { color: var(--cut-red); }
  .payout-desc { font-size: 0.8rem; color: #888; margin-top: 4px; }

  .rules-box {
    background: white;
    border-radius: 8px;
    padding: 24px;
    margin-top: 16px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    line-height: 1.7;
  }
  .rules-box h3 { color: var(--uso-blue); margin-bottom: 12px; }
  .rules-box ul { padding-left: 20px; }
  .rules-box li { margin-bottom: 6px; }

  .section-title {
    font-size: 1.1rem;
    color: var(--uso-blue);
    margin-bottom: 4px;
    padding-bottom: 4px;
    border-bottom: 2px solid var(--uso-red);
    display: inline-block;
  }

  .last-updated {
    text-align: center;
    font-size: 0.75rem;
    color: #aaa;
    padding: 16px;
    font-style: italic;
  }

  .thru-col { color: #888; font-size: 0.8rem; }

  .admin-section { margin-top: 16px; }
  .admin-btn {
    background: var(--uso-blue);
    color: white;
    border: none;
    padding: 10px 24px;
    border-radius: 6px;
    font-family: Georgia, serif;
    font-size: 0.9rem;
    cursor: pointer;
    margin-top: 8px;
    margin-right: 8px;
  }
  .admin-btn:hover { background: var(--uso-dark); }

  @media (max-width: 600px) {
    header h1 { font-size: 1.4rem; }
    .tab-btn { padding: 10px 14px; font-size: 0.8rem; }
    .team-standing-row { grid-template-columns: 30px 1fr auto 20px; padding: 12px; gap: 10px; }
    .team-dropdown-player { grid-template-columns: 30px 1fr auto auto; padding: 8px 12px; }
    .teams-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1>US Open Pool 2026</h1>
  <div class="subtitle">Shinnecock Hills Golf Club &bull; June 18&ndash;21, 2026</div>
</header>

<div class="info-bar">
  <span><span class="gold">$3,000</span> Per Team</span>
  <span><span class="gold">7</span> Teams</span>
  <span><span class="gold">$22,000</span> Total Pot</span>
  <span>Snake Draft &bull; 8 Rounds</span>
  <span id="liveIndicator"><span class="live-dot offline"></span> Waiting for tournament</span>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('leaderboard',this)">Leaderboard</button>
  <button class="tab-btn" onclick="showTab('teams',this)">Teams</button>
  <button class="tab-btn" onclick="showTab('standings',this)">Standings</button>
  <button class="tab-btn" onclick="showTab('payouts',this)">Payouts</button>
  <button class="tab-btn" onclick="showTab('admin',this)">Update</button>
</div>

<div class="container">
  <div id="leaderboard" class="tab-content active"></div>
  <div id="teams" class="tab-content"></div>
  <div id="standings" class="tab-content"></div>
  <div id="payouts" class="tab-content"></div>
  <div id="admin" class="tab-content"></div>
</div>

<div class="last-updated" id="lastUpdated"></div>

<script>
// ============================================================
//  POOL CONFIGURATION
// ============================================================
const OWNERS = {
  "Billy":    { players: ["Scheffler","Burns","Reed","Kitayama","Lowry","Fowler","Bridgeman","Mitchell"] },
  "Remz":     { players: ["Rory","Koepka","Si Woo Kim","English","Cam Smith","Spieth","Bradley","Harman"] },
  "Tommy":    { players: ["Fleetwood","Bryson","Rose","Straka","Noren","Scott","Conners","Keefer"] },
  "Tim":      { players: ["Rahm","Morikawa","Gotterup","Bobby Mac","McNealy","Niemann","Cauley","Berger"] },
  "Stu":      { players: ["Xander","Henley","Hovland","JT","Min Woo","Alex Fitzpatrick","Rai","N Hojgaard"] },
  "Devon":    { players: ["Cam Young","Hatton","Clark","Matsuyama","Gerard","Day","Theegala","Koivun"] },
  "K Cannon": { players: ["Matt Fitzpatrick","Aberg","Cantlay","Spaun","Reitan","Griffin","Puig","Woodland"] }
};

const DRAFT_ORDER = {
  "Scheffler":1,"Rory":2,"Fleetwood":3,"Rahm":4,"Xander":5,"Cam Young":6,"Matt Fitzpatrick":7,
  "Aberg":8,"Hatton":9,"Henley":10,"Morikawa":11,"Bryson":12,"Koepka":13,"Burns":14,
  "Reed":15,"Si Woo Kim":16,"Rose":17,"Gotterup":18,"Hovland":19,"Clark":20,"Cantlay":21,
  "Spaun":22,"Matsuyama":23,"JT":24,"Bobby Mac":25,"Straka":26,"English":27,"Kitayama":28,
  "Lowry":29,"Cam Smith":30,"Noren":31,"McNealy":32,"Min Woo":33,"Gerard":34,"Reitan":35,
  "Griffin":36,"Day":37,"Alex Fitzpatrick":38,"Niemann":39,"Scott":40,"Spieth":41,"Fowler":42,
  "Bridgeman":43,"Bradley":44,"Conners":45,"Cauley":46,"Rai":47,"Theegala":48,"Puig":49,
  "Woodland":50,"Koivun":51,"N Hojgaard":52,"Berger":53,"Keefer":54,"Harman":55,"Mitchell":56
};

// ============================================================
//  NAME MAPPING: Pool nickname -> ESPN feed name
// ============================================================
const NAME_TO_FEED = {
  "Scheffler": "Scheffler",
  "Rory": "McIlroy",
  "Fleetwood": "Fleetwood",
  "Rahm": "Rahm",
  "Xander": "Schauffele",
  "Cam Young": "Young",
  "Matt Fitzpatrick": "Fitzpatrick, M",
  "Burns": "Burns",
  "Koepka": "Koepka",
  "Bryson": "DeChambeau",
  "Morikawa": "Morikawa",
  "Henley": "Henley",
  "Hatton": "Hatton",
  "Aberg": "Aberg",
  "Reed": "Reed",
  "Si Woo Kim": "Kim, S",
  "Rose": "Rose",
  "Gotterup": "Gotterup",
  "Hovland": "Hovland",
  "Clark": "Clark",
  "Cantlay": "Cantlay",
  "Spaun": "Spaun",
  "Matsuyama": "Matsuyama",
  "JT": "Thomas",
  "Bobby Mac": "MacIntyre",
  "Straka": "Straka",
  "English": "English",
  "Kitayama": "Kitayama",
  "Lowry": "Lowry",
  "Cam Smith": "Smith",
  "Noren": "Noren",
  "McNealy": "McNealy",
  "Min Woo": "Lee",
  "Gerard": "Gerard",
  "Reitan": "Reitan",
  "Griffin": "Griffin",
  "Day": "Day",
  "Alex Fitzpatrick": "Fitzpatrick, A",
  "Niemann": "Niemann",
  "Scott": "Scott",
  "Spieth": "Spieth",
  "Fowler": "Fowler",
  "Bridgeman": "Bridgeman",
  "Bradley": "Bradley",
  "Conners": "Conners",
  "Cauley": "Cauley",
  "Rai": "Rai",
  "Theegala": "Theegala",
  "Puig": "Puig",
  "Woodland": "Woodland",
  "Koivun": "Koivun",
  "N Hojgaard": "Hojgaard, N",
  "Berger": "Berger",
  "Keefer": "Keefer",
  "Harman": "Harman",
  "Mitchell": "Mitchell"
};

// ============================================================
//  STATE
// ============================================================
let players = {};
let feedSource = "none";
let lastFetchTime = null;
let autoRefreshInterval = null;
let refreshSeconds = 60;

Object.keys(DRAFT_ORDER).forEach(name => {
  players[name] = { score: null, today: null, thru: null, status: "active", pos: null };
});

// ============================================================
//  LIVE DATA FETCHING — ESPN
// ============================================================
const norm = s => (s || "")
  .normalize("NFD").replace(/[̀-ͯ]/g, "")
  .replace(/[øØ]/g, "o")
  .replace(/[æÆ]/g, "ae")
  .replace(/[łŁ]/g, "l")
  .replace(/[đĐ]/g, "d")
  .toLowerCase().trim();

async function fetchLiveScores() {
  let success = false;
  try {
    success = await fetchESPNFeed();
  } catch(e) {
    console.log("ESPN feed failed:", e);
  }
  if (success) {
    lastFetchTime = new Date();
    renderAll();
  }
  updateFeedStatus(success);
  return success;
}

async function fetchESPNFeed() {
  const url = "https://site.api.espn.com/apis/site/v2/sports/golf/pga/scoreboard";
  const resp = await fetch(url, { cache: "no-cache" });
  if (!resp.ok) return false;
  const data = await resp.json();

  const usoEvent = (data.events || []).find(e =>
    (e.name || "").toLowerCase().includes("u.s. open") ||
    (e.name || "").toLowerCase().includes("us open")
  );
  if (!usoEvent) return false;

  const competition = usoEvent.competitions && usoEvent.competitions[0];
  if (!competition || !competition.competitors) return false;

  const competitors = competition.competitors;

  const byKey = {};
  competitors.forEach(c => {
    const athlete = c.athlete || {};
    const lastName = norm(athlete.lastName || "");
    const firstName = norm(athlete.firstName || "");
    const fullName = norm(athlete.fullName || athlete.displayName || "");
    byKey[lastName] = c;
    byKey[fullName] = c;
    if (firstName && lastName) {
      byKey[lastName + ", " + firstName[0]] = c;
    }
  });

  const compStatus = competition.status || {};
  const compRound = compStatus.period || 0;
  const compComplete = compStatus.type ? compStatus.type.completed : false;

  for (const [poolName, feedHint] of Object.entries(NAME_TO_FEED)) {
    const hint = norm(feedHint);
    let c = byKey[hint];
    if (!c) {
      c = competitors.find(comp => {
        const a = comp.athlete || {};
        return norm(a.lastName || "") === hint ||
               norm(a.fullName || "").includes(hint);
      });
    }

    if (c) {
      let score = null;
      const scoreStr = c.score;
      if (scoreStr !== undefined && scoreStr !== null) {
        score = scoreStr === "E" ? 0 : parseInt(scoreStr, 10);
        if (isNaN(score)) score = null;
      }

      let todayScore = null;

      let status = "active";
      const state = c.status && c.status.type ? c.status.type.name : "";
      if (state === "cut") status = "cut";
      if (state === "wd" || state === "withdrawn") status = "wd";

      const roundPeriods = (c.linescores || []).length;
      if (status === "active" && compRound >= 2 && roundPeriods === 2) {
        const maxPeriods = Math.max(...competitors.map(x => (x.linescores || []).length));
        if (maxPeriods > 2 || compComplete) {
          status = "cut";
        }
      }

      if (status === "cut") {
        score = null;
        todayScore = null;
      }

      let thru = null;
      if (status === "cut") {
        thru = "CUT";
      } else if (c.status) {
        thru = c.status.displayValue || null;
        if (c.status.period && c.status.type) {
          if (c.status.type.state === "post") thru = "F";
        }
      }

      players[poolName] = { score, today: todayScore, thru, status, pos: c.order || null };
    }
  }

  feedSource = "espn";
  return true;
}

function updateFeedStatus(success) {
  const indicator = document.getElementById("liveIndicator");
  if (success && feedSource !== "none") {
    const hasScores = Object.values(players).some(p => p.score !== null);
    if (hasScores) {
      indicator.innerHTML = `<span class="live-dot"></span> LIVE &mdash; via ESPN (updates every ${refreshSeconds}s)`;
    } else {
      indicator.innerHTML = `<span class="live-dot offline"></span> Connected &mdash; awaiting first tee (auto-refresh on)`;
    }
  } else {
    indicator.innerHTML = `<span class="live-dot offline"></span> Offline &mdash; feed unavailable`;
  }
}

// ============================================================
//  HELPERS
// ============================================================
function formatScore(score) {
  if (score === null || score === undefined) return "—";
  if (score === 0) return "E";
  return score > 0 ? `+${score}` : `${score}`;
}

function scoreClass(score, status) {
  if (status === "cut" || status === "wd") return "score-cut";
  if (score === null) return "score-even";
  if (score < 0) return "score-under";
  if (score > 0) return "score-over";
  return "score-even";
}

function getOwner(playerName) {
  for (const [owner, data] of Object.entries(OWNERS)) {
    if (data.players.includes(playerName)) return owner;
  }
  return "";
}

function getPlayersSorted() {
  return Object.entries(players)
    .map(([name, data]) => ({ name, ...data, owner: getOwner(name) }))
    .sort((a, b) => {
      if (a.status === "cut" && b.status !== "cut") return 1;
      if (b.status === "cut" && a.status !== "cut") return -1;
      if (a.status === "wd" && b.status !== "wd") return 1;
      if (b.status === "wd" && a.status !== "wd") return -1;
      if (a.score === null && b.score === null) return (DRAFT_ORDER[a.name]||99) - (DRAFT_ORDER[b.name]||99);
      if (a.score === null) return 1;
      if (b.score === null) return -1;
      return a.score - b.score;
    });
}

function getTeamScore(ownerName) {
  const team = OWNERS[ownerName];
  const activePlayers = team.players
    .map(p => ({ name: p, ...players[p] }))
    .filter(p => p.status === "active" && p.score !== null)
    .sort((a, b) => a.score - b.score);

  const madeCut = team.players.filter(p => players[p].status === "active").length;
  const cutPlayers = team.players.filter(p => players[p].status === "cut" || players[p].status === "wd").length;

  const bestFour = activePlayers.slice(0, 4);
  let totalScore = null;
  if (bestFour.length > 0) {
    totalScore = bestFour.reduce((sum, p) => sum + p.score, 0);
  }

  const hasCut = Object.values(players).some(p => p.status === "cut");
  const eligible = !hasCut || madeCut >= 4;

  return { totalScore, madeCut, cutPlayers, eligible, activeWithScores: activePlayers.length, countingPlayers: bestFour.map(p => p.name) };
}

// ============================================================
//  RENDER
// ============================================================
function toggleTeamDropdown(el) {
  el.parentElement.classList.toggle("expanded");
}

function renderLeaderboard() {
  const sorted = getPlayersSorted();
  let pos = 0, lastScore = -999, sameCount = 0;

  let html = `<h2 class="section-title">Tournament Leaderboard</h2>
    <table class="leaderboard-table">
    <thead><tr>
      <th class="pos-col">Pos</th>
      <th>Player</th>
      <th class="score-col">Total</th>
      <th class="score-col">Today</th>
      <th class="score-col">Thru</th>
    </tr></thead><tbody>`;

  sorted.forEach(p => {
    let displayPos = "—";
    if (p.status === "cut") {
      displayPos = "CUT";
    } else if (p.status === "wd") {
      displayPos = "WD";
    } else if (p.score !== null) {
      if (p.score !== lastScore) {
        pos += 1 + sameCount;
        sameCount = 0;
      } else {
        sameCount++;
      }
      lastScore = p.score;
      displayPos = sorted.filter(x => x.score === p.score && x.status === "active").length > 1 ? `T${pos}` : pos;
    }

    const cutClass = (p.status === "cut" || p.status === "wd") ? "cut" : "";
    html += `<tr class="${cutClass}">
      <td class="pos-col">${displayPos}</td>
      <td>${p.name}<span class="owner-badge">${p.owner}</span></td>
      <td class="score-col ${scoreClass(p.score, p.status)}">${formatScore(p.score)}</td>
      <td class="score-col ${scoreClass(p.today, p.status)}">${formatScore(p.today)}</td>
      <td class="score-col thru-col">${p.thru || "—"}</td>
    </tr>`;
  });

  html += `</tbody></table>`;
  document.getElementById('leaderboard').innerHTML = html;
}

function renderTeams() {
  let html = `<h2 class="section-title">Team Rosters</h2><div class="teams-grid">`;

  for (const [owner, data] of Object.entries(OWNERS)) {
    const { totalScore, countingPlayers } = getTeamScore(owner);
    const countingSet = new Set(countingPlayers || []);
    html += `<div class="team-card">
      <div class="team-card-header">
        <h3>${owner}</h3>
        <span class="team-score">${formatScore(totalScore)}</span>
      </div>
      <div class="team-card-body">`;

    data.players.forEach(playerName => {
      const p = players[playerName];
      const pickNum = DRAFT_ORDER[playerName] || "?";
      const cutClass = (p.status === "cut" || p.status === "wd") ? "cut" : "";
      const star = countingSet.has(playerName) ? '<span style="color:var(--uso-gold);margin-right:4px">&#9733;</span>' : '';
      html += `<div class="team-player ${cutClass}">
        <span>${star}<span class="pick-num">#${pickNum}</span> ${playerName}</span>
        <span class="player-score ${scoreClass(p.score, p.status)}">${formatScore(p.score)}</span>
      </div>`;
    });

    html += `</div></div>`;
  }
  html += `</div>`;
  document.getElementById('teams').innerHTML = html;
}

function renderStandings() {
  const standings = Object.keys(OWNERS)
    .map(owner => ({ owner, ...getTeamScore(owner) }))
    .sort((a, b) => {
      if (!a.eligible && b.eligible) return 1;
      if (a.eligible && !b.eligible) return -1;
      if (a.totalScore === null && b.totalScore === null) return 0;
      if (a.totalScore === null) return 1;
      if (b.totalScore === null) return -1;
      return a.totalScore - b.totalScore;
    });

  let html = `<h2 class="section-title">Team Standings</h2>
    <p style="font-size:0.8rem;color:#888;margin:4px 0 8px;">Team score = sum of the BEST 4 player scores. Must have 4+ players make the cut to be eligible. Last place pays extra $1K.</p>
    <div class="team-standings">`;

  standings.forEach((t, i) => {
    const isLast = i === standings.length - 1 && standings.length === Object.keys(OWNERS).length;
    const hasScores = Object.values(players).some(p => p.score !== null);
    const rankClass = i === 0 ? "first" : i === 1 ? "second" : (isLast && hasScores) ? "last" : "";
    const eligClass = !t.eligible ? "ineligible" : "";
    const lastClass = (isLast && hasScores) ? "last-place" : "";

    const teamPlayers = OWNERS[t.owner].players
      .map(name => ({ name, ...players[name], pick: DRAFT_ORDER[name] }))
      .sort((a, b) => {
        if (a.status === "cut" && b.status !== "cut") return 1;
        if (b.status === "cut" && a.status !== "cut") return -1;
        if (a.score === null && b.score === null) return a.pick - b.pick;
        if (a.score === null) return 1;
        if (b.score === null) return -1;
        return a.score - b.score;
      });

    let dropdownHtml = '<div class="team-players-dropdown">';
    teamPlayers.forEach(p => {
      const cutCls = (p.status === "cut" || p.status === "wd") ? "cut" : "";
      dropdownHtml += `<div class="team-dropdown-player ${cutCls}">
        <span class="dropdown-pick">#${p.pick}</span>
        <span>${p.name}</span>
        <span class="dropdown-thru">${p.thru || ""}</span>
        <span class="dropdown-score ${scoreClass(p.score, p.status)}">${formatScore(p.score)}</span>
      </div>`;
    });
    dropdownHtml += '</div>';

    html += `<div class="team-standing ${eligClass} ${lastClass}">
      <div class="team-standing-row" onclick="toggleTeamDropdown(this)">
        <div class="team-rank ${rankClass}">${i + 1}</div>
        <div class="team-info">
          <h3>${t.owner}</h3>
          <span class="players-made-cut">${t.madeCut} active / ${t.cutPlayers} cut</span>
          ${!t.eligible ? '<span class="ineligible-label"> &bull; INELIGIBLE (need 4 to make cut)</span>' : ''}
          ${(isLast && hasScores) ? '<span class="last-label"> &bull; LAST PLACE (+$1K penalty)</span>' : ''}
        </div>
        <div class="team-total-score ${scoreClass(t.totalScore, '')}">${formatScore(t.totalScore)}</div>
        <div class="team-caret">&#9660;</div>
      </div>
      ${dropdownHtml}
    </div>`;
  });
  html += `</div>`;

  const topPlayers = getPlayersSorted().filter(p => p.status === "active").slice(0, 5);
  if (topPlayers.length > 0 && topPlayers[0].score !== null) {
    html += `<h2 class="section-title" style="margin-top:24px">Individual Leader (Winner = $4K / Runner-Up = $3K)</h2>
      <table class="leaderboard-table">
      <thead><tr><th class="pos-col">Pos</th><th>Player</th><th>Owner</th><th class="score-col">Score</th></tr></thead><tbody>`;
    topPlayers.forEach((p, i) => {
      html += `<tr>
        <td class="pos-col">${i + 1}</td>
        <td>${p.name}</td>
        <td>${p.owner}</td>
        <td class="score-col ${scoreClass(p.score, p.status)}">${formatScore(p.score)}</td>
      </tr>`;
    });
    html += `</tbody></table>`;
  }

  document.getElementById('standings').innerHTML = html;
}

function calcPayouts() {
  const winnings = {};
  const penalties = {};
  Object.keys(OWNERS).forEach(o => { winnings[o] = 0; penalties[o] = 0; });

  const sorted = getPlayersSorted().filter(p => p.status === "active" && p.score !== null);
  const hasScores = sorted.length > 0;
  if (!hasScores) return { winnings, penalties, details: [] };

  const details = [];

  // Individual: Winner ($4K) and Runner-Up ($3K)
  if (sorted.length >= 1) {
    const bestScore = sorted[0].score;
    const winners = sorted.filter(p => p.score === bestScore);
    if (winners.length === 1) {
      winnings[winners[0].owner] += 4000;
      details.push({ prize: "US Open Winner", amount: 4000, owners: [winners[0].owner], player: winners[0].name });
      const remaining = sorted.filter(p => p.score !== bestScore);
      if (remaining.length >= 1) {
        const runnerScore = remaining[0].score;
        const runners = remaining.filter(p => p.score === runnerScore);
        const split = Math.round(3000 / runners.length);
        runners.forEach(r => winnings[r.owner] += split);
        details.push({ prize: "US Open Runner-Up", amount: 3000, owners: runners.map(r => r.owner), player: runners.map(r => r.name).join(", "), split: runners.length > 1 });
      }
    } else {
      const totalPool = 7000;
      const splitAmount = Math.round(totalPool / winners.length);
      winners.forEach(w => winnings[w.owner] += splitAmount);
      details.push({ prize: "US Open Winner + Runner-Up (tied)", amount: totalPool, owners: winners.map(w => w.owner), player: winners.map(w => w.name).join(", "), split: true });
    }
  }

  // Team: Champion ($10K) and Runner-Up ($5K)
  const teamStandings = Object.keys(OWNERS)
    .map(owner => ({ owner, ...getTeamScore(owner) }))
    .filter(t => t.eligible && t.totalScore !== null)
    .sort((a, b) => a.totalScore - b.totalScore);

  if (teamStandings.length >= 1) {
    const bestTeamScore = teamStandings[0].totalScore;
    const teamWinners = teamStandings.filter(t => t.totalScore === bestTeamScore);
    if (teamWinners.length === 1) {
      winnings[teamWinners[0].owner] += 10000;
      details.push({ prize: "Team Champion", amount: 10000, owners: [teamWinners[0].owner] });
      const teamRemaining = teamStandings.filter(t => t.totalScore !== bestTeamScore);
      if (teamRemaining.length >= 1) {
        const runnerTeamScore = teamRemaining[0].totalScore;
        const teamRunners = teamRemaining.filter(t => t.totalScore === runnerTeamScore);
        const split = Math.round(5000 / teamRunners.length);
        teamRunners.forEach(r => winnings[r.owner] += split);
        details.push({ prize: "Team Runner-Up", amount: 5000, owners: teamRunners.map(r => r.owner), split: teamRunners.length > 1 });
      }
    } else {
      const totalPool = teamWinners.length === 2 ? 15000 : 10000;
      const splitAmount = Math.round(totalPool / teamWinners.length);
      teamWinners.forEach(w => winnings[w.owner] += splitAmount);
      details.push({ prize: "Team Champion + Runner-Up (tied)", amount: totalPool, owners: teamWinners.map(w => w.owner), split: true });
    }
  }

  // Last place penalty ($1K)
  const allTeams = Object.keys(OWNERS)
    .map(owner => ({ owner, ...getTeamScore(owner) }))
    .filter(t => t.totalScore !== null)
    .sort((a, b) => a.totalScore - b.totalScore);

  if (allTeams.length === Object.keys(OWNERS).length) {
    const worstScore = allTeams[allTeams.length - 1].totalScore;
    const lastTeams = allTeams.filter(t => t.totalScore === worstScore);
    const penaltyPer = Math.round(1000 / lastTeams.length);
    lastTeams.forEach(t => penalties[t.owner] += penaltyPer);
    details.push({ prize: "Last Place Penalty", amount: -1000, owners: lastTeams.map(t => t.owner), split: lastTeams.length > 1, isPenalty: true });
  }

  return { winnings, penalties, details };
}

function renderPayouts() {
  const { winnings, penalties, details } = calcPayouts();
  const hasScores = Object.values(players).some(p => p.score !== null);

  let html = `<h2 class="section-title">Payout Structure</h2>
    <div class="payouts-grid">
      <div class="payout-card"><h3>US Open Winner</h3><div class="payout-amount">$4,000</div><div class="payout-desc">Owner of the tournament champion</div></div>
      <div class="payout-card"><h3>US Open Runner-Up</h3><div class="payout-amount">$3,000</div><div class="payout-desc">Owner of the 2nd place finisher</div></div>
      <div class="payout-card"><h3>Team Champion</h3><div class="payout-amount">$10,000</div><div class="payout-desc">Lowest best-4 combined score</div></div>
      <div class="payout-card"><h3>Team Runner-Up</h3><div class="payout-amount">$5,000</div><div class="payout-desc">Second lowest team score</div></div>
      <div class="payout-card penalty"><h3>Last Place</h3><div class="payout-amount penalty">+$1,000</div><div class="payout-desc">Worst team pays extra $1K</div></div>
    </div>`;

  if (hasScores) {
    html += `<h2 class="section-title" style="margin-top:24px">Current Winnings (as it stands now)</h2>`;

    if (details.length > 0) {
      html += `<table class="leaderboard-table" style="margin-bottom:16px">
        <thead><tr><th>Prize</th><th>Owner(s)</th><th class="score-col">Amount</th></tr></thead><tbody>`;
      details.forEach(d => {
        const ownerStr = d.owners.join(", ") + (d.split ? " (split)" : "");
        const playerStr = d.player ? ` <span style="color:#888;font-size:0.8rem">(${d.player})</span>` : "";
        const perPerson = d.split ? Math.round(Math.abs(d.amount) / d.owners.length) : Math.abs(d.amount);
        const amtColor = d.isPenalty ? "color:var(--cut-red)" : "color:var(--uso-blue)";
        const prefix = d.isPenalty ? "+$" : "$";
        html += `<tr><td>${d.prize}${playerStr}</td><td>${ownerStr}</td><td class="score-col" style="${amtColor};font-weight:bold">${prefix}${perPerson.toLocaleString()}${d.split ? " each" : ""}</td></tr>`;
      });
      html += `</tbody></table>`;
    }

    const ownerTotals = Object.entries(winnings)
      .map(([owner, amount]) => ({ owner, amount, penalty: penalties[owner] || 0, net: amount - 3000 - (penalties[owner] || 0) }))
      .sort((a, b) => b.net - a.net);

    html += `<table class="leaderboard-table">
      <thead><tr><th>Owner</th><th class="score-col">Winnings</th><th class="score-col">Buy-In</th><th class="score-col">Penalty</th><th class="score-col">Net</th></tr></thead><tbody>`;
    ownerTotals.forEach(o => {
      const netClass = o.net > 0 ? "score-under" : o.net < 0 ? "score-over" : "score-even";
      const netStr = o.net > 0 ? `+$${o.net.toLocaleString()}` : o.net < 0 ? `-$${Math.abs(o.net).toLocaleString()}` : "$0";
      const penaltyStr = o.penalty > 0 ? `+$${o.penalty.toLocaleString()}` : "—";
      html += `<tr>
        <td>${o.owner}</td>
        <td class="score-col" style="font-weight:bold;color:var(--uso-blue)">${o.amount > 0 ? "$" + o.amount.toLocaleString() : "—"}</td>
        <td class="score-col" style="color:#888">$3,000</td>
        <td class="score-col" style="color:${o.penalty > 0 ? 'var(--cut-red)' : '#888'}">${penaltyStr}</td>
        <td class="score-col ${netClass}">${netStr}</td>
      </tr>`;
    });
    html += `</tbody></table>`;
  }

  html += `<div class="rules-box" style="margin-top:16px">
      <h3>Pool Rules</h3>
      <ul>
        <li><strong>Buy-in:</strong> $3,000 per team (7 teams = $21,000)</li>
        <li><strong>Draft:</strong> Snake draft, 8 rounds, 8 players per team (56 total picks)</li>
        <li><strong>Team Eligibility:</strong> At least 4 of your 8 players must make the cut</li>
        <li><strong>Team Score:</strong> Sum of the best 4 player scores (of those who made the cut)</li>
        <li><strong>Individual Prizes:</strong> Based on which owner drafted the US Open winner / runner-up</li>
        <li><strong>Last Place:</strong> Worst team score pays an additional $1,000</li>
        <li><strong>Ties:</strong> Prize money is split evenly among tied owners</li>
      </ul>
    </div>`;
  document.getElementById('payouts').innerHTML = html;
}

function renderAdmin() {
  const feedLabel = feedSource === "espn" ? "ESPN" : "None";
  let html = `<h2 class="section-title">Live Feed Settings</h2>
    <div class="rules-box" style="margin-top:12px">
      <h3>Auto-Refresh Status</h3>
      <p>Feed source: <strong>${feedLabel}</strong></p>
      <p>Last fetched: <strong>${lastFetchTime ? lastFetchTime.toLocaleTimeString() : "Never"}</strong></p>
      <p>Refresh interval: <strong>${refreshSeconds} seconds</strong></p>
      <br>
      <button class="admin-btn" onclick="fetchLiveScores()">Refresh Now</button>
      <button class="admin-btn" onclick="toggleAutoRefresh()">
        ${autoRefreshInterval ? "Pause Auto-Refresh" : "Start Auto-Refresh"}
      </button>
    </div>`;
  document.getElementById('admin').innerHTML = html;
}

function showTab(tabId, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
  if (btn) btn.classList.add('active');
}

function toggleAutoRefresh() {
  if (autoRefreshInterval) {
    clearInterval(autoRefreshInterval);
    autoRefreshInterval = null;
  } else {
    autoRefreshInterval = setInterval(fetchLiveScores, refreshSeconds * 1000);
  }
  renderAdmin();
}

function renderAll() {
  renderLeaderboard();
  renderTeams();
  renderStandings();
  renderPayouts();
  renderAdmin();
  const timeStr = lastFetchTime ? lastFetchTime.toLocaleString() : "Pre-Tournament";
  document.getElementById('lastUpdated').textContent = `Last updated: ${timeStr}`;
}

// INIT
renderAll();
fetchLiveScores().then(() => {
  autoRefreshInterval = setInterval(fetchLiveScores, refreshSeconds * 1000);
  renderAdmin();
});
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 PGA Championship Pool</title>
<style>
  :root {
    --pga-blue: #00205b;
    --pga-dark: #001740;
    --pga-gold: #c8a951;
    --pga-cream: #f0f2f5;
    --pga-light: #e3eaf5;
    --cut-red: #c0392b;
    --birdie-red: #d32f2f;
    --bogey-blue: #1565c0;
    --par: #333;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Georgia', 'Times New Roman', serif;
    background: var(--pga-cream);
    color: #333;
    min-height: 100vh;
  }
  header {
    background: var(--pga-blue);
    color: white;
    text-align: center;
    padding: 24px 16px 18px;
    border-bottom: 4px solid var(--pga-gold);
  }
  header h1 { font-size: 2rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
  header .subtitle { color: var(--pga-gold); font-size: 1rem; font-style: italic; }
  .info-bar {
    background: var(--pga-dark);
    color: white;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: 12px 32px;
    padding: 10px 16px;
    font-size: 0.85rem;
  }
  .info-bar span { white-space: nowrap; }
  .info-bar .gold { color: var(--pga-gold); font-weight: bold; }
  .live-dot {
    display: inline-block;
    width: 8px; height: 8px;
    background: #4caf50;
    border-radius: 50%;
    margin-right: 4px;
    animation: pulse 2s infinite;
  }
  .live-dot.offline { background: #999; animation: none; }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .tabs {
    display: flex;
    justify-content: center;
    gap: 0;
    background: white;
    border-bottom: 2px solid #ddd;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .tab-btn {
    padding: 12px 24px;
    border: none;
    background: white;
    font-family: Georgia, serif;
    font-size: 0.95rem;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
    color: #666;
  }
  .tab-btn:hover { color: var(--pga-blue); }
  .tab-btn.active {
    color: var(--pga-blue);
    border-bottom-color: var(--pga-gold);
    font-weight: bold;
  }

  .container { max-width: 1100px; margin: 0 auto; padding: 16px; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .leaderboard-table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    margin-top: 12px;
  }
  .leaderboard-table th {
    background: var(--pga-blue);
    color: white;
    padding: 10px 12px;
    text-align: left;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .leaderboard-table th.score-col,
  .leaderboard-table td.score-col { text-align: center; }
  .leaderboard-table td {
    padding: 8px 12px;
    border-bottom: 1px solid #eee;
    font-size: 0.9rem;
  }
  .leaderboard-table tr:hover { background: var(--pga-light); }
  .leaderboard-table tr.cut td { color: #999; text-decoration: line-through; }
  .leaderboard-table tr.cut td.pos-col { text-decoration: none; }
  .pos-col { width: 40px; text-align: center; font-weight: bold; color: #888; }
  .owner-badge {
    display: inline-block;
    background: var(--pga-blue);
    color: white;
    padding: 1px 8px;
    border-radius: 10px;
    font-size: 0.7rem;
    margin-left: 8px;
    vertical-align: middle;
  }
  .score-under { color: var(--birdie-red); font-weight: bold; }
  .score-over { color: var(--bogey-blue); font-weight: bold; }
  .score-even { color: var(--par); }
  .score-cut { color: #999; }

  .team-standings { display: grid; gap: 12px; margin-top: 12px; }
  .team-standing {
    background: white;
    border-radius: 8px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    overflow: hidden;
  }
  .team-standing-row {
    padding: 16px 20px;
    display: grid;
    grid-template-columns: 40px 1fr auto 24px;
    align-items: center;
    gap: 16px;
    cursor: pointer;
    transition: background 0.15s;
    user-select: none;
  }
  .team-standing-row:hover { background: var(--pga-light); }
  .team-standing.ineligible { opacity: 0.6; }
  .team-rank { font-size: 1.5rem; font-weight: bold; color: var(--pga-gold); text-align: center; }
  .team-rank.first { color: #c8a951; }
  .team-rank.second { color: #8a8a8a; }
  .team-info h3 { font-size: 1.1rem; margin-bottom: 2px; }
  .team-info .players-made-cut { font-size: 0.8rem; color: #888; }
  .team-info .ineligible-label { color: var(--cut-red); font-weight: bold; font-size: 0.75rem; }
  .team-total-score { font-size: 1.4rem; font-weight: bold; }
  .team-caret {
    font-size: 0.9rem;
    color: #999;
    transition: transform 0.2s;
    text-align: center;
  }
  .team-standing.expanded .team-caret { transform: rotate(180deg); }
  .team-players-dropdown {
    display: none;
    border-top: 1px solid #eee;
    background: #fafafa;
  }
  .team-standing.expanded .team-players-dropdown { display: block; }
  .team-dropdown-player {
    display: grid;
    grid-template-columns: 40px 1fr auto auto;
    gap: 12px;
    padding: 8px 20px;
    font-size: 0.85rem;
    border-bottom: 1px solid #f0f0f0;
    align-items: center;
  }
  .team-dropdown-player:last-child { border-bottom: none; }
  .team-dropdown-player.cut { color: #bbb; text-decoration: line-through; }
  .team-dropdown-player.cut .dropdown-score { text-decoration: none; }
  .team-dropdown-player .dropdown-pick { color: #aaa; font-size: 0.75rem; text-align: center; }
  .team-dropdown-player .dropdown-thru { color: #999; font-size: 0.75rem; }
  .team-dropdown-player .dropdown-score { font-weight: bold; min-width: 40px; text-align: right; }

  .teams-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    margin-top: 12px;
  }
  .team-card {
    background: white;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  .team-card-header {
    background: var(--pga-blue);
    color: white;
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .team-card-header h3 { font-size: 1rem; }
  .team-card-header .team-score { color: var(--pga-gold); font-size: 1.1rem; }
  .team-card-body { padding: 0; }
  .team-player {
    display: flex;
    justify-content: space-between;
    padding: 8px 16px;
    border-bottom: 1px solid #f0f0f0;
    font-size: 0.85rem;
  }
  .team-player:last-child { border-bottom: none; }
  .team-player.cut { color: #bbb; text-decoration: line-through; }
  .team-player .pick-num { color: #aaa; margin-right: 6px; font-size: 0.75rem; }
  .team-player .player-score { font-weight: bold; }

  .payouts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
    margin-top: 12px;
  }
  .payout-card {
    background: white;
    border-radius: 8px;
    padding: 20px;
    text-align: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    border-top: 4px solid var(--pga-gold);
  }
  .payout-card h3 { color: var(--pga-blue); margin-bottom: 8px; }
  .payout-amount { font-size: 1.8rem; font-weight: bold; color: var(--pga-gold); }
  .payout-desc { font-size: 0.8rem; color: #888; margin-top: 4px; }

  .rules-box {
    background: white;
    border-radius: 8px;
    padding: 24px;
    margin-top: 16px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    line-height: 1.7;
  }
  .rules-box h3 { color: var(--pga-blue); margin-bottom: 12px; }
  .rules-box ul { padding-left: 20px; }
  .rules-box li { margin-bottom: 6px; }

  .section-title {
    font-size: 1.1rem;
    color: var(--pga-blue);
    margin-bottom: 4px;
    padding-bottom: 4px;
    border-bottom: 2px solid var(--pga-gold);
    display: inline-block;
  }

  .last-updated {
    text-align: center;
    font-size: 0.75rem;
    color: #aaa;
    padding: 16px;
    font-style: italic;
  }

  .thru-col { color: #888; font-size: 0.8rem; }

  .admin-section { margin-top: 16px; }
  .admin-btn {
    background: var(--pga-blue);
    color: white;
    border: none;
    padding: 10px 24px;
    border-radius: 6px;
    font-family: Georgia, serif;
    font-size: 0.9rem;
    cursor: pointer;
    margin-top: 8px;
    margin-right: 8px;
  }
  .admin-btn:hover { background: var(--pga-dark); }

  @media (max-width: 600px) {
    header h1 { font-size: 1.4rem; }
    .tab-btn { padding: 10px 14px; font-size: 0.8rem; }
    .team-standing-row { grid-template-columns: 30px 1fr auto 20px; padding: 12px; gap: 10px; }
    .team-dropdown-player { grid-template-columns: 30px 1fr auto auto; padding: 8px 12px; }
    .teams-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1>PGA Championship Pool 2026</h1>
  <div class="subtitle">Aronimink Golf Club &bull; May 14&ndash;17, 2026</div>
</header>

<div class="info-bar">
  <span><span class="gold">$3,000</span> Per Team</span>
  <span><span class="gold">8</span> Teams</span>
  <span><span class="gold">$24,000</span> Total Pot</span>
  <span>Snake Draft &bull; 8 Rounds</span>
  <span id="liveIndicator"><span class="live-dot offline"></span> Waiting for tournament</span>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('leaderboard',this)">Leaderboard</button>
  <button class="tab-btn" onclick="showTab('teams',this)">Teams</button>
  <button class="tab-btn" onclick="showTab('standings',this)">Standings</button>
  <button class="tab-btn" onclick="showTab('payouts',this)">Payouts</button>
  <button class="tab-btn" onclick="showTab('admin',this)">Update</button>
</div>

<div class="container">
  <div id="leaderboard" class="tab-content active"></div>
  <div id="teams" class="tab-content"></div>
  <div id="standings" class="tab-content"></div>
  <div id="payouts" class="tab-content"></div>
  <div id="admin" class="tab-content"></div>
</div>

<div class="last-updated" id="lastUpdated"></div>

<script>
// ============================================================
//  POOL CONFIGURATION
// ============================================================
const OWNERS = {
  "Nolan":  { players: ["Scheffler","Hatton","Si Woo Kim","Straka","English","Noren","Harry Hall","Brennan"] },
  "Timmy":  { players: ["Rory","Henley","Gotterup","Bhatia","Griffin","Thorbjornsen","Smalley","Penge"] },
  "Tommy":  { players: ["Xander","Morikawa","Hovland","Lowry","Conners","Day","Rai","Hoge"] },
  "Stu":    { players: ["Rahm","Min Woo","N Hojgaard","Spaun","McNealy","Detry","Puig","McCarty"] },
  "Logan":  { players: ["Bryson","JT","Koepka","Matsuyama","Niemann","Im","Clark","Cam Smith"] },
  "Billy":  { players: ["Young","Rose","Fowler","Scott","Kitayama","Bradley","Taylor","Mitchell"] },
  "Devon":  { players: ["Aberg","Cantlay","Burns","Spieth","Reitan","Woodland","Fox","Yellamaraju"] },
  "Remz":   { players: ["Fleetwood","Matt Fitzpatrick","Bobby Mac","Reed","Alex Fitzpatrick","Bridgeman","Theegala","R Hojgaard"] }
};

const DRAFT_ORDER = {
  "Scheffler":1,"Rory":2,"Xander":3,"Rahm":4,"Bryson":5,"Young":6,"Aberg":7,"Fleetwood":8,
  "Matt Fitzpatrick":9,"Cantlay":10,"Rose":11,"JT":12,"Min Woo":13,"Morikawa":14,"Henley":15,"Hatton":16,
  "Si Woo Kim":17,"Gotterup":18,"Hovland":19,"N Hojgaard":20,"Koepka":21,"Fowler":22,"Burns":23,"Bobby Mac":24,
  "Reed":25,"Spieth":26,"Scott":27,"Matsuyama":28,"Spaun":29,"Lowry":30,"Bhatia":31,"Straka":32,
  "English":33,"Griffin":34,"Conners":35,"McNealy":36,"Niemann":37,"Kitayama":38,"Reitan":39,"Alex Fitzpatrick":40,
  "Bridgeman":41,"Woodland":42,"Bradley":43,"Im":44,"Detry":45,"Day":46,"Thorbjornsen":47,"Noren":48,
  "Harry Hall":49,"Smalley":50,"Rai":51,"Puig":52,"Clark":53,"Taylor":54,"Fox":55,"Theegala":56,
  "R Hojgaard":57,"Yellamaraju":58,"Mitchell":59,"Cam Smith":60,"McCarty":61,"Hoge":62,"Penge":63,"Brennan":64
};

// ============================================================
//  NAME MAPPING: Pool nickname -> ESPN fullName (exact match)
//  Using full names from ESPN feed for reliable matching
// ============================================================
const NAME_TO_FEED = {
  "Scheffler": "Scottie Scheffler",
  "Rory": "Rory McIlroy",
  "Xander": "Xander Schauffele",
  "Rahm": "Jon Rahm",
  "Bryson": "Bryson DeChambeau",
  "Young": "Cameron Young",
  "Aberg": "Ludvig Aberg",
  "Fleetwood": "Tommy Fleetwood",
  "Matt Fitzpatrick": "Matt Fitzpatrick",
  "Cantlay": "Patrick Cantlay",
  "Rose": "Justin Rose",
  "JT": "Justin Thomas",
  "Min Woo": "Min Woo Lee",
  "Morikawa": "Collin Morikawa",
  "Henley": "Russell Henley",
  "Hatton": "Tyrrell Hatton",
  "Si Woo Kim": "Si Woo Kim",
  "Gotterup": "Chris Gotterup",
  "Hovland": "Viktor Hovland",
  "N Hojgaard": "Nicolai Hojgaard",
  "Koepka": "Brooks Koepka",
  "Fowler": "Rickie Fowler",
  "Burns": "Sam Burns",
  "Bobby Mac": "Robert MacIntyre",
  "Reed": "Patrick Reed",
  "Spieth": "Jordan Spieth",
  "Scott": "Adam Scott",
  "Matsuyama": "Hideki Matsuyama",
  "Spaun": "J.J. Spaun",
  "Lowry": "Shane Lowry",
  "Bhatia": "Akshay Bhatia",
  "Straka": "Sepp Straka",
  "English": "Harris English",
  "Griffin": "Ben Griffin",
  "Conners": "Corey Conners",
  "McNealy": "Maverick McNealy",
  "Niemann": "Joaquin Niemann",
  "Kitayama": "Kurt Kitayama",
  "Reitan": "Kristoffer Reitan",
  "Alex Fitzpatrick": "Alex Fitzpatrick",
  "Bridgeman": "Jacob Bridgeman",
  "Woodland": "Gary Woodland",
  "Bradley": "Keegan Bradley",
  "Im": "Sungjae Im",
  "Detry": "Thomas Detry",
  "Day": "Jason Day",
  "Thorbjornsen": "Michael Thorbjornsen",
  "Noren": "Alex Noren",
  "Harry Hall": "Harry Hall",
  "Smalley": "Alex Smalley",
  "Rai": "Aaron Rai",
  "Puig": "David Puig",
  "Clark": "Wyndham Clark",
  "Taylor": "Nick Taylor",
  "Fox": "Ryan Fox",
  "Theegala": "Sahith Theegala",
  "R Hojgaard": "Rasmus Hojgaard",
  "Yellamaraju": "Sudarshan Yellamaraju",
  "Mitchell": "Keith Mitchell",
  "Cam Smith": "Cameron Smith",
  "McCarty": "Matt McCarty",
  "Hoge": "Tom Hoge",
  "Penge": "Marco Penge",
  "Brennan": "Michael Brennan"
};

// ============================================================
//  STATE
// ============================================================
let players = {};
let feedSource = "none";
let lastFetchTime = null;
let autoRefreshInterval = null;
let refreshSeconds = 60;

Object.keys(DRAFT_ORDER).forEach(name => {
  players[name] = { score: null, today: null, thru: null, status: "active", pos: null };
});

// ============================================================
//  LIVE DATA FETCHING — ESPN (PGA Championship)
// ============================================================
const norm = s => (s || "")
  .normalize("NFD").replace(/[̀-ͯ]/g, "")
  .replace(/[øØ]/g, "o")
  .replace(/[æÆ]/g, "ae")
  .replace(/[łŁ]/g, "l")
  .replace(/[đĐ]/g, "d")
  .toLowerCase().trim();

async function fetchLiveScores() {
  let success = false;
  try {
    success = await fetchESPNFeed();
  } catch(e) {
    console.log("ESPN feed failed:", e);
  }
  if (success) {
    lastFetchTime = new Date();
    renderAll();
  }
  updateFeedStatus(success);
  return success;
}

async function fetchESPNFeed() {
  const url = "https://site.api.espn.com/apis/site/v2/sports/golf/pga/scoreboard";
  const resp = await fetch(url, { cache: "no-cache" });
  if (!resp.ok) return false;
  const data = await resp.json();

  // Find the PGA Championship event
  const pgaEvent = (data.events || []).find(e =>
    (e.name || "").toLowerCase().includes("pga championship")
  );
  if (!pgaEvent) return false;

  const competition = pgaEvent.competitions && pgaEvent.competitions[0];
  if (!competition || !competition.competitors) return false;

  const competitors = competition.competitors;

  // Build lookup by normalized fullName (ESPN doesn't always populate firstName/lastName)
  const byFullName = {};
  competitors.forEach(c => {
    const athlete = c.athlete || {};
    const fullName = norm(athlete.fullName || athlete.displayName || "");
    byFullName[fullName] = c;
  });

  for (const [poolName, feedHint] of Object.entries(NAME_TO_FEED)) {
    const hint = norm(feedHint);
    let c = byFullName[hint];
    // Fallback: partial match on fullName
    if (!c) {
      c = competitors.find(comp => {
        const a = comp.athlete || {};
        const full = norm(a.fullName || a.displayName || "");
        return full.includes(hint) || hint.includes(full);
      });
    }

    if (c) {
      let score = null;
      const scoreStr = c.score;
      if (scoreStr !== undefined && scoreStr !== null) {
        score = scoreStr === "E" ? 0 : parseInt(scoreStr, 10);
        if (isNaN(score)) score = null;
      }

      let todayScore = null;
      if (c.linescores && c.linescores.length > 0) {
        const currentRound = c.linescores[c.linescores.length - 1];
        if (currentRound && currentRound.value !== undefined) {
          // ESPN gives raw strokes per round, not relative to par
        }
      }

      let status = "active";
      const state = c.status && c.status.type ? c.status.type.name : "";
      if (state === "cut") status = "cut";
      if (state === "wd" || state === "withdrawn") status = "wd";

      let thru = null;
      if (c.status) {
        thru = c.status.displayValue || null;
        if (c.status.period && c.status.type) {
          if (c.status.type.state === "post") thru = "F";
        }
      }

      players[poolName] = { score, today: todayScore, thru, status, pos: c.sortOrder || null };
    }
  }

  feedSource = "espn";
  return true;
}

function updateFeedStatus(success) {
  const indicator = document.getElementById("liveIndicator");
  if (success && feedSource !== "none") {
    const hasScores = Object.values(players).some(p => p.score !== null);
    if (hasScores) {
      indicator.innerHTML = `<span class="live-dot"></span> LIVE &mdash; via ESPN (updates every ${refreshSeconds}s)`;
    } else {
      indicator.innerHTML = `<span class="live-dot offline"></span> Connected &mdash; awaiting first tee (auto-refresh on)`;
    }
  } else {
    indicator.innerHTML = `<span class="live-dot offline"></span> Offline &mdash; feed unavailable`;
  }
}

// ============================================================
//  HELPERS
// ============================================================
function formatScore(score) {
  if (score === null || score === undefined) return "—";
  if (score === 0) return "E";
  return score > 0 ? `+${score}` : `${score}`;
}

function scoreClass(score, status) {
  if (status === "cut" || status === "wd") return "score-cut";
  if (score === null) return "score-even";
  if (score < 0) return "score-under";
  if (score > 0) return "score-over";
  return "score-even";
}

function getOwner(playerName) {
  for (const [owner, data] of Object.entries(OWNERS)) {
    if (data.players.includes(playerName)) return owner;
  }
  return "";
}

function getPlayersSorted() {
  return Object.entries(players)
    .map(([name, data]) => ({ name, ...data, owner: getOwner(name) }))
    .sort((a, b) => {
      if (a.status === "cut" && b.status !== "cut") return 1;
      if (b.status === "cut" && a.status !== "cut") return -1;
      if (a.status === "wd" && b.status !== "wd") return 1;
      if (b.status === "wd" && a.status !== "wd") return -1;
      if (a.score === null && b.score === null) return (DRAFT_ORDER[a.name]||99) - (DRAFT_ORDER[b.name]||99);
      if (a.score === null) return 1;
      if (b.score === null) return -1;
      return a.score - b.score;
    });
}

function getTeamScore(ownerName) {
  const team = OWNERS[ownerName];
  const activePlayers = team.players
    .map(p => ({ name: p, ...players[p] }))
    .filter(p => p.status === "active" && p.score !== null)
    .sort((a, b) => a.score - b.score);

  const madeCut = team.players.filter(p => players[p].status === "active").length;
  const cutPlayers = team.players.filter(p => players[p].status === "cut" || players[p].status === "wd").length;

  const bestFour = activePlayers.slice(0, 4);
  let totalScore = null;
  if (bestFour.length > 0) {
    totalScore = bestFour.reduce((sum, p) => sum + p.score, 0);
  }

  const hasCut = Object.values(players).some(p => p.status === "cut");
  const eligible = !hasCut || madeCut >= 4;

  return { totalScore, madeCut, cutPlayers, eligible, activeWithScores: activePlayers.length, countingPlayers: bestFour.map(p => p.name) };
}

// ============================================================
//  RENDER
// ============================================================
function toggleTeamDropdown(el) {
  el.parentElement.classList.toggle("expanded");
}

function renderLeaderboard() {
  const sorted = getPlayersSorted();
  let pos = 0, lastScore = -999, sameCount = 0;

  let html = `<h2 class="section-title">Tournament Leaderboard</h2>
    <table class="leaderboard-table">
    <thead><tr>
      <th class="pos-col">Pos</th>
      <th>Player</th>
      <th class="score-col">Total</th>
      <th class="score-col">Today</th>
      <th class="score-col">Thru</th>
    </tr></thead><tbody>`;

  sorted.forEach(p => {
    let displayPos = "—";
    if (p.status === "cut") {
      displayPos = "CUT";
    } else if (p.status === "wd") {
      displayPos = "WD";
    } else if (p.score !== null) {
      if (p.score !== lastScore) {
        pos += 1 + sameCount;
        sameCount = 0;
      } else {
        sameCount++;
      }
      lastScore = p.score;
      displayPos = sorted.filter(x => x.score === p.score && x.status === "active").length > 1 ? `T${pos}` : pos;
    }

    const cutClass = (p.status === "cut" || p.status === "wd") ? "cut" : "";
    html += `<tr class="${cutClass}">
      <td class="pos-col">${displayPos}</td>
      <td>${p.name}<span class="owner-badge">${p.owner}</span></td>
      <td class="score-col ${scoreClass(p.score, p.status)}">${formatScore(p.score)}</td>
      <td class="score-col ${scoreClass(p.today, p.status)}">${formatScore(p.today)}</td>
      <td class="score-col thru-col">${p.thru || "—"}</td>
    </tr>`;
  });

  html += `</tbody></table>`;
  document.getElementById('leaderboard').innerHTML = html;
}

function renderTeams() {
  let html = `<h2 class="section-title">Team Rosters</h2><div class="teams-grid">`;

  for (const [owner, data] of Object.entries(OWNERS)) {
    const { totalScore, countingPlayers } = getTeamScore(owner);
    const countingSet = new Set(countingPlayers || []);
    html += `<div class="team-card">
      <div class="team-card-header">
        <h3>${owner}</h3>
        <span class="team-score">${formatScore(totalScore)}</span>
      </div>
      <div class="team-card-body">`;

    data.players.forEach(playerName => {
      const p = players[playerName];
      const pickNum = DRAFT_ORDER[playerName] || "?";
      const cutClass = (p.status === "cut" || p.status === "wd") ? "cut" : "";
      const star = countingSet.has(playerName) ? '<span style="color:var(--pga-gold);margin-right:4px">&#9733;</span>' : '';
      html += `<div class="team-player ${cutClass}">
        <span>${star}<span class="pick-num">#${pickNum}</span> ${playerName}</span>
        <span class="player-score ${scoreClass(p.score, p.status)}">${formatScore(p.score)}</span>
      </div>`;
    });

    html += `</div></div>`;
  }
  html += `</div>`;
  document.getElementById('teams').innerHTML = html;
}

function renderStandings() {
  const standings = Object.keys(OWNERS)
    .map(owner => ({ owner, ...getTeamScore(owner) }))
    .sort((a, b) => {
      if (!a.eligible && b.eligible) return 1;
      if (a.eligible && !b.eligible) return -1;
      if (a.totalScore === null && b.totalScore === null) return 0;
      if (a.totalScore === null) return 1;
      if (b.totalScore === null) return -1;
      return a.totalScore - b.totalScore;
    });

  let html = `<h2 class="section-title">Team Standings</h2>
    <p style="font-size:0.8rem;color:#888;margin:4px 0 8px;">Team score = sum of the BEST 4 player scores. Must have 4+ players make the cut to be eligible.</p>
    <div class="team-standings">`;

  standings.forEach((t, i) => {
    const rankClass = i === 0 ? "first" : i === 1 ? "second" : "";
    const eligClass = !t.eligible ? "ineligible" : "";

    const teamPlayers = OWNERS[t.owner].players
      .map(name => ({ name, ...players[name], pick: DRAFT_ORDER[name] }))
      .sort((a, b) => {
        if (a.status === "cut" && b.status !== "cut") return 1;
        if (b.status === "cut" && a.status !== "cut") return -1;
        if (a.score === null && b.score === null) return a.pick - b.pick;
        if (a.score === null) return 1;
        if (b.score === null) return -1;
        return a.score - b.score;
      });

    let dropdownHtml = '<div class="team-players-dropdown">';
    teamPlayers.forEach(p => {
      const cutCls = (p.status === "cut" || p.status === "wd") ? "cut" : "";
      dropdownHtml += `<div class="team-dropdown-player ${cutCls}">
        <span class="dropdown-pick">#${p.pick}</span>
        <span>${p.name}</span>
        <span class="dropdown-thru">${p.thru || ""}</span>
        <span class="dropdown-score ${scoreClass(p.score, p.status)}">${formatScore(p.score)}</span>
      </div>`;
    });
    dropdownHtml += '</div>';

    html += `<div class="team-standing ${eligClass}">
      <div class="team-standing-row" onclick="toggleTeamDropdown(this)">
        <div class="team-rank ${rankClass}">${i + 1}</div>
        <div class="team-info">
          <h3>${t.owner}</h3>
          <span class="players-made-cut">${t.madeCut} active / ${t.cutPlayers} cut</span>
          ${!t.eligible ? '<span class="ineligible-label"> &bull; INELIGIBLE (need 4 to make cut)</span>' : ''}
        </div>
        <div class="team-total-score ${scoreClass(t.totalScore, '')}">${formatScore(t.totalScore)}</div>
        <div class="team-caret">&#9660;</div>
      </div>
      ${dropdownHtml}
    </div>`;
  });
  html += `</div>`;

  const topPlayers = getPlayersSorted().filter(p => p.status === "active").slice(0, 5);
  if (topPlayers.length > 0 && topPlayers[0].score !== null) {
    html += `<h2 class="section-title" style="margin-top:24px">Individual Leader (PGA Champ Winner = $6K / Runner-Up = $3K)</h2>
      <table class="leaderboard-table">
      <thead><tr><th class="pos-col">Pos</th><th>Player</th><th>Owner</th><th class="score-col">Score</th></tr></thead><tbody>`;
    topPlayers.forEach((p, i) => {
      html += `<tr>
        <td class="pos-col">${i + 1}</td>
        <td>${p.name}</td>
        <td>${p.owner}</td>
        <td class="score-col ${scoreClass(p.score, p.status)}">${formatScore(p.score)}</td>
      </tr>`;
    });
    html += `</tbody></table>`;
  }

  document.getElementById('standings').innerHTML = html;
}

function calcPayouts() {
  const winnings = {};
  Object.keys(OWNERS).forEach(o => winnings[o] = 0);

  const sorted = getPlayersSorted().filter(p => p.status === "active" && p.score !== null);
  const hasScores = sorted.length > 0;
  if (!hasScores) return { winnings, details: [] };

  const details = [];

  // Individual: PGA Champ Winner ($6K) and Runner-Up ($3K)
  if (sorted.length >= 1) {
    const bestScore = sorted[0].score;
    const winners = sorted.filter(p => p.score === bestScore);
    if (winners.length === 1) {
      winnings[winners[0].owner] += 6000;
      details.push({ prize: "PGA Champ Winner", amount: 6000, owners: [winners[0].owner], player: winners[0].name });
      const remaining = sorted.filter(p => p.score !== bestScore);
      if (remaining.length >= 1) {
        const runnerScore = remaining[0].score;
        const runners = remaining.filter(p => p.score === runnerScore);
        const split = Math.round(3000 / runners.length);
        runners.forEach(r => winnings[r.owner] += split);
        details.push({ prize: "PGA Champ Runner-Up", amount: 3000, owners: runners.map(r => r.owner), player: runners.map(r => r.name).join(", "), split: runners.length > 1 });
      }
    } else {
      const totalPool = 9000;
      const splitAmount = Math.round(totalPool / winners.length);
      winners.forEach(w => winnings[w.owner] += splitAmount);
      details.push({ prize: "PGA Champ Winner + Runner-Up (tied)", amount: totalPool, owners: winners.map(w => w.owner), player: winners.map(w => w.name).join(", "), split: true });
    }
  }

  // Team: Champion ($10K) and Runner-Up ($5K)
  const teamStandings = Object.keys(OWNERS)
    .map(owner => ({ owner, ...getTeamScore(owner) }))
    .filter(t => t.eligible && t.totalScore !== null)
    .sort((a, b) => a.totalScore - b.totalScore);

  if (teamStandings.length >= 1) {
    const bestTeamScore = teamStandings[0].totalScore;
    const teamWinners = teamStandings.filter(t => t.totalScore === bestTeamScore);
    if (teamWinners.length === 1) {
      winnings[teamWinners[0].owner] += 10000;
      details.push({ prize: "Team Champion", amount: 10000, owners: [teamWinners[0].owner] });
      const teamRemaining = teamStandings.filter(t => t.totalScore !== bestTeamScore);
      if (teamRemaining.length >= 1) {
        const runnerTeamScore = teamRemaining[0].totalScore;
        const teamRunners = teamRemaining.filter(t => t.totalScore === runnerTeamScore);
        const split = Math.round(5000 / teamRunners.length);
        teamRunners.forEach(r => winnings[r.owner] += split);
        details.push({ prize: "Team Runner-Up", amount: 5000, owners: teamRunners.map(r => r.owner), split: teamRunners.length > 1 });
      }
    } else {
      const totalPool = teamWinners.length === 2 ? 15000 : 10000;
      const splitAmount = Math.round(totalPool / teamWinners.length);
      teamWinners.forEach(w => winnings[w.owner] += splitAmount);
      details.push({ prize: "Team Champion + Runner-Up (tied)", amount: totalPool, owners: teamWinners.map(w => w.owner), split: true });
    }
  }

  return { winnings, details };
}

function renderPayouts() {
  const { winnings, details } = calcPayouts();
  const hasScores = Object.values(players).some(p => p.score !== null);

  let html = `<h2 class="section-title">Payout Structure</h2>
    <div class="payouts-grid">
      <div class="payout-card"><h3>PGA Champ Winner</h3><div class="payout-amount">$6,000</div><div class="payout-desc">Owner of the tournament champion</div></div>
      <div class="payout-card"><h3>PGA Champ Runner-Up</h3><div class="payout-amount">$3,000</div><div class="payout-desc">Owner of the solo 2nd place finisher</div></div>
      <div class="payout-card"><h3>Team Champion</h3><div class="payout-amount">$10,000</div><div class="payout-desc">Lowest best-4 combined score (4+ must make cut)</div></div>
      <div class="payout-card"><h3>Team Runner-Up</h3><div class="payout-amount">$5,000</div><div class="payout-desc">Second lowest combined team score</div></div>
    </div>`;

  if (hasScores) {
    html += `<h2 class="section-title" style="margin-top:24px">Current Winnings (as it stands now)</h2>`;

    if (details.length > 0) {
      html += `<table class="leaderboard-table" style="margin-bottom:16px">
        <thead><tr><th>Prize</th><th>Owner(s)</th><th class="score-col">Amount</th></tr></thead><tbody>`;
      details.forEach(d => {
        const ownerStr = d.owners.join(", ") + (d.split ? " (split)" : "");
        const playerStr = d.player ? ` <span style="color:#888;font-size:0.8rem">(${d.player})</span>` : "";
        const perPerson = d.split ? Math.round(d.amount / d.owners.length) : d.amount;
        html += `<tr><td>${d.prize}${playerStr}</td><td>${ownerStr}</td><td class="score-col" style="color:var(--pga-blue);font-weight:bold">$${perPerson.toLocaleString()}${d.split ? " each" : ""}</td></tr>`;
      });
      html += `</tbody></table>`;
    }

    const ownerTotals = Object.entries(winnings)
      .map(([owner, amount]) => ({ owner, amount, net: amount - 3000 }))
      .sort((a, b) => b.amount - a.amount);

    html += `<table class="leaderboard-table">
      <thead><tr><th>Owner</th><th class="score-col">Winnings</th><th class="score-col">Buy-In</th><th class="score-col">Net</th></tr></thead><tbody>`;
    ownerTotals.forEach(o => {
      const netClass = o.net > 0 ? "score-under" : o.net < 0 ? "score-over" : "score-even";
      const netStr = o.net > 0 ? `+$${o.net.toLocaleString()}` : o.net < 0 ? `-$${Math.abs(o.net).toLocaleString()}` : "$0";
      html += `<tr>
        <td>${o.owner}</td>
        <td class="score-col" style="font-weight:bold;color:var(--pga-blue)">${o.amount > 0 ? "$" + o.amount.toLocaleString() : "—"}</td>
        <td class="score-col" style="color:#888">$3,000</td>
        <td class="score-col ${netClass}">${netStr}</td>
      </tr>`;
    });
    html += `</tbody></table>`;
  }

  html += `<div class="rules-box" style="margin-top:16px">
      <h3>Pool Rules</h3>
      <ul>
        <li><strong>Buy-in:</strong> $3,000 per team (8 teams = $24,000 total pot)</li>
        <li><strong>Draft:</strong> Snake draft, 8 rounds, 8 players per team (64 total picks)</li>
        <li><strong>Team Eligibility:</strong> At least 4 of your 8 players must make the cut</li>
        <li><strong>Team Score:</strong> Sum of the best 4 player scores (of those who made the cut)</li>
        <li><strong>Individual Prizes:</strong> Based on which owner drafted the PGA Championship winner / runner-up</li>
        <li><strong>Ties:</strong> Prize money is split evenly among tied owners</li>
      </ul>
    </div>`;
  document.getElementById('payouts').innerHTML = html;
}

function renderAdmin() {
  const feedLabel = feedSource === "espn" ? "ESPN" : "None";
  let html = `<h2 class="section-title">Live Feed Settings</h2>
    <div class="rules-box" style="margin-top:12px">
      <h3>Auto-Refresh Status</h3>
      <p>Feed source: <strong>${feedLabel}</strong></p>
      <p>Last fetched: <strong>${lastFetchTime ? lastFetchTime.toLocaleTimeString() : "Never"}</strong></p>
      <p>Refresh interval: <strong>${refreshSeconds} seconds</strong></p>
      <br>
      <button class="admin-btn" onclick="fetchLiveScores()">Refresh Now</button>
      <button class="admin-btn" onclick="toggleAutoRefresh()">
        ${autoRefreshInterval ? "Pause Auto-Refresh" : "Start Auto-Refresh"}
      </button>
    </div>`;
  document.getElementById('admin').innerHTML = html;
}

function showTab(tabId, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
  if (btn) btn.classList.add('active');
}

function toggleAutoRefresh() {
  if (autoRefreshInterval) {
    clearInterval(autoRefreshInterval);
    autoRefreshInterval = null;
  } else {
    autoRefreshInterval = setInterval(fetchLiveScores, refreshSeconds * 1000);
  }
  renderAdmin();
}

function renderAll() {
  renderLeaderboard();
  renderTeams();
  renderStandings();
  renderPayouts();
  renderAdmin();
  const timeStr = lastFetchTime ? lastFetchTime.toLocaleString() : "Pre-Tournament";
  document.getElementById('lastUpdated').textContent = `Last updated: ${timeStr}`;
}

// INIT
renderAll();
fetchLiveScores().then(() => {
  autoRefreshInterval = setInterval(fetchLiveScores, refreshSeconds * 1000);
  renderAdmin();
});
</script>

</html>
